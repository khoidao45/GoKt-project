services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gokt
      POSTGRES_USER: gokt
      POSTGRES_PASSWORD: gokt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gokt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
  
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build:
      context: .
      
      dockerfile: Gokt/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=gokt;Username=gokt;Password=gokt"
      ConnectionStrings__Redis: "redis:6379"
      Kafka__BootstrapServers: "kafka:29092"
      Jwt__Secret: "${JWT_SECRET:-changeme-in-production-32chars!}"
      Jwt__Issuer: "${JWT_ISSUER:-gokt-api}"
      Jwt__Audience: "${JWT_AUDIENCE:-gokt-clients}"

  matching-worker:
    build:
      context: .
      dockerfile: src/Gokt.MatchingWorker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=gokt;Username=gokt;Password=gokt"
      ConnectionStrings__Redis: "redis:6379"
      Kafka__BootstrapServers: "kafka:29092"
      Kafka__GroupId: "gokt-matching-worker"
    deploy:
      replicas: 2

volumes:
  pgdata:
